version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: finance-tracker-db
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: ./backend
    container_name: finance-tracker-backend
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://finance_user:finance_password@db:5432/finance_tracker
      # Если после смены моделей упали budget_* таблицы: выставить "1", перезапустить backend, вернуть "0"
      RESET_BUDGET_SCHEMA: "${RESET_BUDGET_SCHEMA:-}"
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  db_data:

